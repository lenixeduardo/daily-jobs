# ============================================================
# CONFIGURAÇÃO DO SEU PERFIL — edite este arquivo para
# customizar a busca de vagas para o seu perfil
# ============================================================

profile:
  name: "Eduardo"
  bio: "Frontend developer com foco em React, Next.js e TypeScript, com experiência em Node.js e desenvolvimento fullstack."

  # Suas stacks (usadas para calcular o % de match com cada vaga)
  stack:
    - javascript
    - typescript
    - react
    - nodejs
    - "next.js"
    - frontend
    - fullstack

search:
  # Termos de busca enviados para as APIs
  keywords:
    - "javascript developer"
    - "typescript developer"
    - "react developer"
    - "frontend developer"
    - "fullstack developer"
    - "node developer"
    - "javascript"
    - "nodejs"
    - "next.js"
    - "fullstack"

  # Modalidades aceitas
  modalities:
    - remote
    - remoto
    - hybrid
    - híbrido
    - international

experience:
  # Máximo de anos de experiência exigidos (vagas com mais são descartadas)
  max_years: 4

  # Palavras que indicam nível acima do aceitável (vaga será descartada)
  exclude_levels:
    - senior
    - sênior
    - "sr."
    - "5+ years"
    - "6+ years"
    - "7+ years"
    - "8+ years"
    - "10+ years"

  # Palavras que indicam nível dentro do aceitável (vaga será mantida)
  include_levels:
    - junior
    - júnior
    - mid
    - pleno
    - "1-2 years"
    - "1-3 years"
    - "2-4 years"
    - "up to 4 years"

# ============================================================
# CANDIDATURA AUTOMÁTICA
# ============================================================

auto_apply:
  enabled: false          # mude para true para ativar
  dry_run: true           # true = preenche o formulário mas NÃO envia; mude para false quando pronto
  min_match_pct: 70       # só aplica em vagas com % de match maior ou igual a este valor
  max_per_run: 3          # limite de candidaturas por execução diária
  cover_letter_language: "en"  # "en" para inglês, "pt-BR" para português
  ats_allowlist:          # plataformas permitidas (LinkedIn e Indeed nunca são usados)
    - greenhouse
    - lever
    - workable

# Seus dados pessoais para preencher os formulários automaticamente
# IMPORTANTE: preencha todos os campos antes de ativar o auto_apply
applicant:
  first_name: "Eduardo"
  last_name: ""                      # preencha seu sobrenome
  email: ""                          # seu email de candidatura
  phone: ""                          # ex: +55 11 99999-9999
  linkedin_url: ""                   # ex: https://linkedin.com/in/eduardo
  location: "Brazil (Remote)"
  resume_path: "assets/resume.pdf"   # coloque seu currículo neste caminho
