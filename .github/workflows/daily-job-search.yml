name: Daily Job Search

on:
  schedule:
    # 12:00 UTC = 09:00 BRT
    - cron: "0 12 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  search-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: scripts/job-search/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/job-search/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run job search
        env:
          JSEARCH_API_KEY:    ${{ secrets.JSEARCH_API_KEY }}
          ADZUNA_APP_ID:      ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY:     ${{ secrets.ADZUNA_APP_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/job-search/search.py

      - name: Commit applied_jobs state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add data/applied_jobs.json data/screenshots/ || true
          git diff --staged --quiet || git commit -m "chore: update applied_jobs [skip ci]"
          git push || true

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
